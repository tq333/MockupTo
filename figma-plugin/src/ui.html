<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --ink:    #1a1a1a;
      --muted:  #888;
      --bg:     #f5f3ee;
      --accent: #0073cf;
      --danger: #cc3300;
      --success:#2e7d32;
      --border: #1a1a1a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 12px;
      font: 13px/1.4 -apple-system, system-ui, "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    h1 { font-size: 13px; margin: 0 0 10px; font-weight: 700; }
    textarea {
      width: 100%;
      height: 140px;
      padding: 8px;
      font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      border: 2px solid var(--border);
      border-radius: 3px;
      background: #fff;
      resize: none;
      color: var(--ink);
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    textarea.drag-over { background: #ddeeff; }

    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    button {
      flex: 1;
      padding: 8px 12px;
      font: 600 13px/1 inherit;
      color: var(--ink);
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: #f5f3ee; }
    button:active:not(:disabled) { transform: translate(1px, 1px); }
    button.primary { background: var(--ink); color: #fff; }
    button.primary:hover:not(:disabled) { background: #000; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .hint {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .hint code { background: #fff; padding: 1px 4px; border-radius: 2px; font-size: 10px; }

    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border: 2px solid var(--border);
      border-radius: 3px;
      font-size: 12px;
      background: #fff;
      white-space: pre-wrap;
      max-height: 240px;
      overflow: auto;
    }
    .status.ok    { border-color: var(--success); }
    .status.err   { border-color: var(--danger);  background: #fff0ec; }
    .status.busy  { border-color: var(--accent);  background: #ddeeff; }
    .status.hidden { display: none; }
    .status h2 { margin: 0 0 6px; font-size: 12px; font-weight: 700; }
    .status ul { margin: 4px 0 0; padding-left: 16px; }
    .status li { margin: 2px 0; }
    .kv { display: grid; grid-template-columns: max-content 1fr; column-gap: 8px; row-gap: 2px; }
    .kv b { font-weight: 600; }
    .warn { color: var(--danger); }
  </style>
</head>
<body>

  <h1>Mockup Sync · Import IR JSON</h1>

  <textarea id="json" placeholder='Paste IR JSON here, drop a .json file, or click "Import from clipboard".'></textarea>
  <div class="hint">
    Produced by the Mockup Sync chrome extension. Spec: <code>ir.v1.schema.json</code>.
  </div>

  <div class="btn-row">
    <button id="paste">From clipboard</button>
    <button id="import" class="primary" disabled>Import</button>
  </div>

  <div id="status" class="status hidden"></div>

  <script>
    const $       = (id) => document.getElementById(id);
    const $json   = $('json');
    const $paste  = $('paste');
    const $import = $('import');
    const $status = $('status');

    function setStatus(kind, html) {
      $status.className = 'status ' + kind;
      $status.innerHTML = html;
    }
    function clearStatus() { $status.className = 'status hidden'; $status.innerHTML = ''; }

    function validate(text) {
      if (!text || !text.trim()) return { ok: false, error: 'Paste or drop an IR JSON first.' };
      let ir;
      try { ir = JSON.parse(text); }
      catch (e) { return { ok: false, error: 'Not valid JSON: ' + e.message }; }
      if (!ir || !ir.version) return { ok: false, error: 'Missing "version" field.' };
      if (!ir.root) return { ok: false, error: 'Missing "root" node.' };
      if (!ir.meta) return { ok: false, error: 'Missing "meta" field.' };
      return { ok: true, ir };
    }

    function updateButtonState() {
      const v = validate($json.value);
      $import.disabled = !v.ok;
      if (!v.ok && $json.value.trim()) setStatus('err', 'Invalid: ' + v.error);
      else if (v.ok) clearStatus();
    }
    $json.addEventListener('input', updateButtonState);

    // Drag-and-drop .json
    $json.addEventListener('dragover',  (e) => { e.preventDefault(); $json.classList.add('drag-over'); });
    $json.addEventListener('dragleave', ()  => { $json.classList.remove('drag-over'); });
    $json.addEventListener('drop',      (e) => {
      e.preventDefault();
      $json.classList.remove('drag-over');
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { $json.value = r.result; updateButtonState(); };
      r.readAsText(f);
    });

    // Clipboard paste
    $paste.addEventListener('click', async () => {
      try {
        const t = await navigator.clipboard.readText();
        $json.value = t;
        updateButtonState();
      } catch (e) {
        setStatus('err', 'Clipboard blocked: ' + e.message + '<br>Please paste manually.');
      }
    });

    $import.addEventListener('click', () => {
      const v = validate($json.value);
      if (!v.ok) { setStatus('err', v.error); return; }
      setStatus('busy', 'Importing…');
      $import.disabled = true;
      parent.postMessage({ pluginMessage: { type: 'import', ir: v.ir } }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data && event.data.pluginMessage;
      if (!msg) return;
      $import.disabled = false;
      if (msg.type === 'done')   renderDone(msg);
      if (msg.type === 'error')  setStatus('err', 'Import failed:<br>' + escapeHtml(msg.message));
      if (msg.type === 'log')    console.log('[plugin]', msg.text);
    };

    function renderDone(msg) {
      const s = msg.stats || {};
      const rows = [
        ['Nodes rendered',   s.nodesRendered || 0],
        ['Text nodes',       s.textNodes || 0],
        ['Instances',        s.instancesCreated + ' / ' + (s.instancesRequested || 0)],
        ['Variables bound',  (s.variablesBound || 0)],
        ['Text styles bound',(s.textStylesBound || 0)],
        ['Missing components', s.missingComponents && s.missingComponents.length || 0],
        ['Missing variables',  s.missingVariables  && s.missingVariables.length  || 0],
      ];
      let html = '<h2>✓ Imported</h2><div class="kv">';
      for (const [k, v] of rows) html += '<b>' + escapeHtml(k) + '</b><span>' + escapeHtml(String(v)) + '</span>';
      html += '</div>';
      if (s.missingComponents && s.missingComponents.length) {
        html += '<h2 class="warn">Missing components</h2><ul>';
        for (const n of s.missingComponents.slice(0, 15)) html += '<li>' + escapeHtml(n) + '</li>';
        html += '</ul>';
      }
      if (s.missingVariables && s.missingVariables.length) {
        html += '<h2 class="warn">Missing variables</h2><ul>';
        for (const n of s.missingVariables.slice(0, 15)) html += '<li>' + escapeHtml(n) + '</li>';
        html += '</ul>';
      }
      setStatus('ok', html);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
